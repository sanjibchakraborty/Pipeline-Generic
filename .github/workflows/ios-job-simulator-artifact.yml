# Unsigned Debug Simulator .app for QA / automation (matches kit ios.yml behavior).

name: iOS — Simulator app artifact

on:
  workflow_call:
    inputs:
      scheme:
        type: string
        description: Xcode scheme
        default: PipelineGeneric
      project:
        type: string
        description: Path to .xcodeproj
        default: PipelineGeneric/PipelineGeneric.xcodeproj
      artifact_name:
        type: string
        description: upload-artifact name
        default: PipelineGeneric-iphonesimulator-Debug

env:
  XCODE_VERSION: latest-stable

jobs:
  simulator-app:
    name: Build Debug Simulator .app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: DerivedDataCI
          key: ${{ runner.os }}-simapp-${{ hashFiles('PipelineGeneric/PipelineGeneric.xcodeproj/project.pbxproj', 'PipelineGeneric/PipelineGeneric.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'PipelineGeneric/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-simapp-

      # Build only — unit tests run in ios-job-test.yml (avoids duplicate test runs).
      - name: Build Simulator .app
        env:
          DerivedDataPath: ${{ github.workspace }}/DerivedDataCI
          PROJECT: ${{ inputs.project }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          set -euo pipefail
          DEST="$(python3 "${{ github.workspace }}/.github/scripts/ios_first_iphone_sim_udid.py")"
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "${DEST}" \
            -derivedDataPath "$DerivedDataPath" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Upload Simulator app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: DerivedDataCI/Build/Products/Debug-iphonesimulator/${{ inputs.scheme }}.app
          if-no-files-found: error
