name: iOS — archive (staging)

on:
  workflow_call:
    inputs:
      app_identifier:
        type: string
        description: Application bundle ID for Match / codesigning
        default: com.codeandtheory.PipelineGeneric
      upload_to_testflight:
        type: boolean
        description: Upload the IPA to TestFlight after gym (same ASC secrets as Match)
        default: false
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false

env:
  XCODE_VERSION: latest-stable

jobs:
  archive-staging:
    name: Archive (Match + gym, optional TestFlight)
    runs-on: macos-15
    env:
      APP_IDENTIFIER: ${{ inputs.app_identifier }}
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM & DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: archive-${{ runner.os }}-${{ hashFiles('PipelineGeneric/PipelineGeneric.xcodeproj/project.pbxproj', '**/Package.resolved', '**/Podfile.lock', 'Gemfile.lock') }}
          restore-keys: archive-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Ruby gems (fastlane)
        run: bundle install --jobs 4 --retry 3

      - name: Staging build (Match + gym)
        env:
          APP_IDENTIFIER: ${{ inputs.app_identifier }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane staging_build

      - name: Upload to TestFlight
        if: inputs.upload_to_testflight
        env:
          APP_IDENTIFIER: ${{ inputs.app_identifier }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: bundle exec fastlane upload_testflight_ipa ipa:"${{ github.workspace }}/build/PipelineGeneric.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: PipelineGeneric-staging-ipa
          path: build/PipelineGeneric.ipa
          if-no-files-found: warn
