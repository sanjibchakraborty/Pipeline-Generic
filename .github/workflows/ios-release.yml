name: iOS — archive (staging)

on:
  workflow_call:
    inputs:
      app_identifier:
        type: string
        description: Application bundle ID (must match the App Store provisioning profile)
        default: com.codeandtheory.PipelineGeneric
      upload_to_testflight:
        type: boolean
        description: Upload the IPA to TestFlight after gym (App Store Connect API secrets)
        default: false
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      DIST_CERTIFICATE_BASE64:
        required: true
      DIST_CERTIFICATE_PASSWORD:
        required: true
      DIST_PROFILE_BASE64:
        required: true
      IOS_CODESIGN_IDENTITY:
        required: false

  workflow_dispatch:
    inputs:
      app_identifier:
        type: string
        description: Application bundle ID (must match the App Store provisioning profile)
        default: com.codeandtheory.PipelineGeneric
      upload_to_testflight:
        type: boolean
        description: Upload the IPA to TestFlight after gym (App Store Connect API secrets)
        default: false

env:
  XCODE_VERSION: latest-stable

jobs:
  archive-staging:
    name: Archive (P12 + profile + gym, optional TestFlight)
    runs-on: macos-15
    env:
      APP_IDENTIFIER: ${{ inputs.app_identifier }}
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM & DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: archive-${{ runner.os }}-${{ hashFiles('PipelineGeneric/PipelineGeneric.xcodeproj/project.pbxproj', '**/Package.resolved', '**/Podfile.lock', 'Gemfile.lock') }}
          restore-keys: archive-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install Ruby gems (fastlane)
        run: bundle install --jobs 4 --retry 3

      # ── App Store distribution certificate + provisioning profile (no Match) ──
      - name: Install App Store certificate and provisioning profile
        env:
          DIST_CERTIFICATE_BASE64: ${{ secrets.DIST_CERTIFICATE_BASE64 }}
          DIST_CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
          DIST_PROFILE_BASE64: ${{ secrets.DIST_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=temppassword

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          printf '%s' "$DIST_CERTIFICATE_BASE64" | /usr/bin/base64 -D > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$DIST_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          PROFILE_PATH="$RUNNER_TEMP/appstore.mobileprovision"
          printf '%s' "$DIST_PROFILE_BASE64" | /usr/bin/base64 -D > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$RUNNER_TEMP/profile.plist")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$RUNNER_TEMP/profile.plist")

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"

          {
            echo "IOS_PROVISIONING_PROFILE_NAME<<PROFILE_NAME_EOF"
            echo "$PROFILE_NAME"
            echo "PROFILE_NAME_EOF"
            echo "APPLE_TEAM_ID=$TEAM_ID"
          } >> "$GITHUB_ENV"
          echo "✅ Certificate and App Store profile installed (UUID $UUID)"

      - name: Staging build (gym)
        env:
          APP_IDENTIFIER: ${{ inputs.app_identifier }}
          IOS_CODESIGN_IDENTITY: ${{ secrets.IOS_CODESIGN_IDENTITY }}
        run: bundle exec fastlane staging_build

      - name: Upload to TestFlight
        if: inputs.upload_to_testflight
        env:
          APP_IDENTIFIER: ${{ inputs.app_identifier }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: bundle exec fastlane upload_testflight_ipa ipa:"${{ github.workspace }}/build/PipelineGeneric.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: PipelineGeneric-staging-ipa
          path: build/PipelineGeneric.ipa
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
