name: iOS — archive (staging)

on:
  workflow_call:
    inputs:
      app_identifier:
        type: string
        description: Application bundle ID for Match / codesigning
        default: com.codeandtheory.PipelineTest1
    secrets:
      APP_STORE_CONNECT_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false

jobs:
  archive-staging:
    name: Archive (TestFlight / staging) — Match + gym
    runs-on: macos-15
    env:
      APP_IDENTIFIER: ${{ inputs.app_identifier }}
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: archive-${{ runner.os }}-${{ hashFiles('**/project.pbxproj', '**/Package.resolved', '**/Podfile.lock') }}
          restore-keys: archive-${{ runner.os }}-

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.os }}-archive-${{ hashFiles('.github/workflows/ios-*.yml') }}
          restore-keys: brew-dl-${{ runner.os }}-

      - name: Install fastlane
        run: brew list fastlane &>/dev/null || brew install fastlane

      - name: Staging build (Match + gym)
        env:
          APP_IDENTIFIER: ${{ inputs.app_identifier }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane staging_build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PipelineTest1-staging-ipa
          path: build/PipelineTest1.ipa
          if-no-files-found: warn
