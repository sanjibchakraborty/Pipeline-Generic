name: iOS — security

on:
  workflow_call:
    secrets:
      # Must be `required: false` so `secrets: inherit` works when the secret is unset.
      # The Snyk step skips (with a notice) if SNYK_TOKEN is empty.
      SNYK_TOKEN:
        required: false

env:
  XCODE_VERSION: latest-stable

jobs:
  security-sast-and-deps:
    name: SAST, secrets & dependency scan
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode (for SwiftPM resolution context)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.os }}-sec-${{ hashFiles('.github/workflows/ios-*.yml') }}
          restore-keys: brew-dl-${{ runner.os }}-

      - name: Install scanners
        run: |
          brew list semgrep &>/dev/null || brew install semgrep
          if ! brew list snyk &>/dev/null; then brew tap snyk/tap && brew install snyk; fi
          brew list trufflehog &>/dev/null || brew install trufflehog

      - name: Semgrep (auto + repo rules under .semgrep/)
        run: |
          semgrep scan \
            --config auto \
            --config .semgrep/mobile.yml \
            --config .semgrep/ci.yml \
            --config .semgrep/sentinel.yml \
            --exclude '**/*.xcconfig' \
            --error

      - name: TruffleHog — secret pattern scan
        run: trufflehog filesystem . --fail

      - name: Snyk — SwiftPM / iOS dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::notice::SNYK_TOKEN is not set — skipping Snyk. Add the secret under Settings → Secrets and variables → Actions to enable dependency scanning."
            exit 0
          fi
          # Bare `snyk test` exits 2–3 when no supported manifest exists (e.g. Xcode-only app with no root Package.swift / Podfile).
          if [ ! -f Package.swift ] && [ ! -f Podfile ] && [ ! -f Podfile.lock ]; then
            echo "::notice::No Package.swift or Podfile / Podfile.lock at repo root — skipping Snyk. Add SwiftPM or CocoaPods at the repository root, or extend this step for your layout."
            exit 0
          fi
          snyk auth "$SNYK_TOKEN"
          if [ -f Package.swift ]; then
            snyk test --file=Package.swift --fail-on=all
          elif [ -f Podfile.lock ]; then
            snyk test --file=Podfile.lock --fail-on=all
          else
            snyk test --file=Podfile --fail-on=all
          fi
