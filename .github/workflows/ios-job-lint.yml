name: iOS — lint (SwiftLint + SwiftFormat)

# SwiftLint + SwiftFormat for the main CI DAG. Rich reports / tech-debt: ios-code-health.yml

on:
  workflow_call:

env:
  XCODE_VERSION: latest-stable

jobs:
  lint-and-format:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache Homebrew downloads
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.os }}-lint-${{ hashFiles('.github/workflows/ios-*.yml', '.swiftformat') }}
          restore-keys: brew-dl-${{ runner.os }}-

      - name: Install SwiftLint
        run: brew list swiftlint &>/dev/null || brew install swiftlint

      - name: Install SwiftFormat
        run: brew list swiftformat &>/dev/null || brew install swiftformat

      - name: SwiftFormat (lint — fails if formatting needed)
        run: |
          swiftformat --lint \
            PipelineGeneric/PipelineGeneric \
            PipelineGeneric/PipelineGenericTests \
            PipelineGeneric/PipelineGenericUITests

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging
