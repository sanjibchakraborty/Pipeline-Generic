name: iOS — lint & format

on:
  workflow_call:

jobs:
  lint-and-format:
    name: SwiftLint & swift-format
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.os }}-lint-${{ hashFiles('.github/workflows/ios-*.yml') }}
          restore-keys: brew-dl-${{ runner.os }}-

      - name: Install linters
        run: |
          brew list swiftlint &>/dev/null || brew install swiftlint
          brew list swift-format &>/dev/null || brew install swift-format

      - name: SwiftLint (strict — fails on any violation)
        run: swiftlint lint --strict --reporter github-actions-logging

      - name: swift-format (lint — fails on needed changes)
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --strict --recursive PipelineTest1 PipelineTest1Tests PipelineTest1UITests
          else
            swift format lint --strict --parallel PipelineTest1 PipelineTest1Tests PipelineTest1UITests
          fi
