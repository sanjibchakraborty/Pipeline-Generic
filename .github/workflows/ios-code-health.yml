# SwiftLint + tech-debt markers + heuristic security scan + health summary.
# Main CI also runs SwiftLint + SwiftFormat via ios-job-lint.yml; this workflow adds reports + scans.

name: iOS code health

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: latest-stable

jobs:
  reports:
    name: SwiftLint & codebase reports
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint (JSON report)
        run: |
          set +e
          mkdir -p Reports
          swiftlint lint --reporter json > Reports/swiftlint.json
          echo $? > Reports/swiftlint.exit
          set -e

      - name: SwiftLint (GitHub annotations)
        if: always()
        run: swiftlint lint --reporter github-actions-logging || true

      - name: Tech debt scan
        if: always()
        run: python3 .github/scripts/tech_debt_scan.py

      - name: Security patterns scan
        if: always()
        run: python3 .github/scripts/security_patterns_scan.py

      - name: Codebase health summary
        if: always()
        run: python3 .github/scripts/codebase_health_report.py

      - name: Job summary
        if: always()
        run: cat Reports/codebase-health-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-code-health-reports
          path: |
            Reports/swiftlint.json
            Reports/swiftlint.exit
            Reports/tech-debt.md
            Reports/security-findings.md
            Reports/codebase-health-summary.md
          if-no-files-found: warn

      - name: Enforce SwiftLint
        if: always()
        run: |
          if [ ! -f Reports/swiftlint.exit ]; then
            echo "::error::SwiftLint exit file missing"
            exit 1
          fi
          exit_code="$(cat Reports/swiftlint.exit)"
          if [ "$exit_code" != "0" ]; then
            echo "::error::SwiftLint reported violations (see artifact ios-code-health-reports / swiftlint.json)"
            exit 1
          fi
