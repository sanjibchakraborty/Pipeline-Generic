# Assembler: triggers + job DAG. Per-job steps live in ios-job-*.yml (workflow_call).

name: iOS CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    uses: ./.github/workflows/ios-job-lint.yml

  security-sast-and-deps:
    uses: ./.github/workflows/ios-job-security.yml
    secrets: inherit

  test-and-coverage:
    needs: [lint-and-format, security-sast-and-deps]
    uses: ./.github/workflows/ios-job-test.yml
    with:
      scheme: PipelineTest1
      project: PipelineTest1.xcodeproj
      simulator_destination: platform=iOS Simulator,name=iPhone 16,OS=latest
      coverage_threshold_percent: "80"

  archive-staging:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [lint-and-format, security-sast-and-deps, test-and-coverage]
    uses: ./.github/workflows/ios-job-archive.yml
    secrets: inherit
    with:
      app_identifier: com.codeandtheory.PipelineTest1
